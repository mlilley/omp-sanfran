# foreground = 'p:black'
# background = 'transparent'

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'

# --- OS ---
[[blocks.segments]]
type = "os"
style = "accordion"
powerline_symbol = "Óāį"
leading_powerline_symbol = "Óā∂"
foreground = "p:fg_os"
background = "p:bg_os"
template = "{{.Icon}} {{ .HostName }} "

# --- TIME ---
[[blocks.segments]]
type = "time"
style = "accordion"
powerline_symbol = "Óāį"
foreground = "p:fg_time"
background = "p:bg_time"
template = " ÓéÖ {{ .CurrentDate | date \"15:04\" }} "

# --- PATH ---
[[blocks.segments]]
type = "path"
style = "accordion"
powerline_symbol = "Óāį"
foreground = "p:fg_path"
background = "p:bg_path"
template = " ÔĀľ {{ path .Path .Location }} "
[blocks.segments.properties]
style = 'full'

