# --- GIT ---
[[blocks.segments]]
type = "git"
style = "accordion"
powerline_symbol = "Óāį"
foreground = "p:fg_git"
background = "p:bg_git"
template = """ \
{{ if .UpstreamURL }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}\
{{ .HEAD }}\
{{ if .BranchStatus }} {{ .BranchStatus }}{{ end }}\
{{ if .Working.Changed }} ÔĀĄ {{ .Working.String }}{{ end }}\
{{ if .Staging.Changed }} ÔĀÜ {{ .Staging.String }}{{ end }} \
"""
[blocks.segments.properties]
# branch_icon = "Ôźė "
branch_icon = ""
branch_template = '{{ trunc 25 .Branch }}'
fetch_status = true
fetch_upstream_icon = true

# --- langs ---
[[blocks.segments]]
type = 'text'
style = 'accordion'
powerline_symbol = 'Óāį'
foreground = 'p:fg_lang'
background = 'p:bg_lang'
template = ""
[[blocks.segments]]
type = 'go'
style = 'powerline'
powerline_symbol = 'Óāį'
foreground = 'p:fg_lang'
background = 'p:bg_lang'
template = "<#000000>Óėß</> {{ .Full }} "
[[blocks.segments]]
type = 'node'
style = 'powerline'
powerline_symbol = 'Óāį'
foreground = 'p:fg_lang'
background = 'p:bg_lang'
template = "Óúė {{ .Full }} "
[[blocks.segments]]
type = 'python'
style = 'powerline'
powerline_symbol = 'Óāį'
foreground = 'p:fg_lang'
background = 'p:bg_lang'
template = "<#ffffff>ÓąĶ</> {{ .Full }}</> "

# --- end ---
[[blocks.segments]]
type = 'text'
style = 'accordion'
powerline_symbol = 'Óāį'
foreground = 'p:transparent'
background = 'p:bg_end'

[palette]
fg_os = '#fbf1c7' #fbf1c7
fg_time = '#fbf1c7' #fbf1c7
fg_path = '#fbf1c7' #fbf1c7
fg_git = '#fbf1c7' #fbf1c7
fg_lang = '#fbf1c7' #fbf1c7
fg_end = '#fbf1c7' #fbf1c7

fg_lang_go = '#ffffff'
fg_lang_node = '#ffffff'
fg_lang_python = '#ffffff'

# rose ‚Üí plum
bg_os = '#85144b'
bg_time = '#b5174e'
bg_path = '#d4316a'
bg_git = '#9b2d7a'
bg_lang = '#6f2da8'
bg_end = '#665c54'
